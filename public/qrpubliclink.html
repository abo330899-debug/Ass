<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Public Verify</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f3f4f6; font-family: Arial, sans-serif; color: #111827; }
    .card { max-width: 820px; margin: 30px auto; background: #fff; border-radius: 18px; padding: 24px; box-shadow: 0 10px 35px rgba(0,0,0,.08); }
    .badge { display: inline-block; background: #fee2e2; color: #991b1b; padding: 8px 14px; border-radius: 999px; font-weight: 700; margin-bottom: 15px; font-size: 14px; }
    h1 { margin: 0 0 18px; color: #166534; font-size: 28px; }
    .sub { margin-bottom: 18px; color: #6b7280; font-size: 14px; }
    .row { display: grid; grid-template-columns: 190px 1fr; gap: 12px; border-bottom: 1px solid #e5e7eb; padding: 12px 0; }
    .label { font-weight: bold; color: #374151; }
    .value { color: #111827; word-break: break-word; }
    .error { background: #fee2e2; color: #991b1b; padding: 14px; border-radius: 12px; font-weight: bold; }
    .scanner-link { display: inline-block; margin-top: 18px; padding: 12px 16px; background: #2563eb; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }
    .status { display: inline-block; padding: 6px 12px; border-radius: 999px; background: #dcfce7; color: #166534; font-weight: 800; }
    @media (max-width: 600px) { .card { margin: 12px; padding: 18px; } .row { grid-template-columns: 1fr; } h1 { font-size: 24px; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">نموذج تجريبي من سيرفرك - غير حكومي</div>
    <h1 id="title">Loading...</h1>
    <div class="sub" id="subtitle">جاري قراءة QR والتحقق من السيرفر...</div>
    <div id="content"></div>
    <a class="scanner-link" href="/qrpubliclink">فتح قارئ الكاميرا</a>
  </div>

  <script>
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const content = document.getElementById("content");

    function getCode() {
      const url = new URL(location.href);
      const fromQuery = url.searchParams.get("code");
      if (fromQuery) return fromQuery.trim();
      const parts = location.pathname.split("/").filter(Boolean);
      const index = parts.indexOf("qrpubliclink");
      if (index !== -1 && parts[index + 1]) return decodeURIComponent(parts[index + 1]).trim();
      return null;
    }

    function row(label, value) {
      return `<div class="row"><div class="label">${label}</div><div class="value">${value || "-"}</div></div>`;
    }

    async function verify() {
      const code = getCode();
      if (!code) {
        title.textContent = "Scan QR";
        subtitle.textContent = "لا يوجد كود داخل الرابط.";
        content.innerHTML = `<div class="error">افتح القارئ أو استخدم رابط مثل /qrpubliclink/DOC-1001</div>`;
        return;
      }

      try {
        const res = await fetch(`/api/verify/${encodeURIComponent(code)}`);
        const data = await res.json();
        if (!data.success) {
          title.textContent = "QR مرفوض";
          subtitle.textContent = "السيرفر لم يجد هذه الوثيقة.";
          content.innerHTML = `<div class="error">${data.message || data.error}</div>`;
          return;
        }

        const d = data.document;
        title.textContent = "Valid";
        subtitle.textContent = "تم التحقق من الوثيقة من سيرفرك بنجاح.";
        content.innerHTML = `
          ${row("ID", d.doc_id)}
          ${row("Company", d.company_name)}
          ${row("Owner", d.owner_name)}
          ${row("Driver", d.driver_name)}
          ${row("Vehicle", d.vehicle_number)}
          ${row("Governorate", d.governorate)}
          ${row("Material", d.material)}
          ${row("Quantity", `${d.quantity} ${d.unit}`)}
          ${row("Destination", d.destination)}
          ${row("Status", `<span class="status">${d.status}</span>`)}
          ${row("Version", d.numberOfVersion)}
          ${row("Created At", d.created_at)}
          ${row("Note", d.note)}
        `;
      } catch (e) {
        title.textContent = "Error";
        subtitle.textContent = "تعذر الاتصال بالسيرفر.";
        content.innerHTML = `<div class="error">فشل الاتصال بالسيرفر</div>`;
      }
    }

    verify();
  </script>
</body>
</html>
